  /api/v1/portal/{project_uuid}/chat/sessions/{session_uuid}/messages/:
    get:
      tags: [Portal Chat]
      summary: List portal chat session messages
      description: Retrieve all messages for a given chat session, along with running task and user input information.
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/session_uuid'
      responses:
        '200':
          description: Chat messages.
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: '#/components/schemas/PortalChatMessage'
                    description: Array of chat messages in the session.
                  running_task:
                    type: boolean
                    description: Whether there is an ongoing AI task in the session.
                  user_input:
                    type: object
                    additionalProperties: true
                    description: Data from the user's most recent input that started a task.

  /api/v1/portal/{project_uuid}/chat/:
    get:
      tags: [Portal Chat]
      summary: Get the latest portal chat AI reply after a non-streaming wait
      description: Poll for the latest AI reply in a chat session after a non-streaming request.
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - name: session_uuid
          in: query
          required: true
          schema:
            type: string
          description: UUID of the chat session to poll for the AI reply.
      responses:
        '200':
          description: Latest AI reply.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ai_reply:
                    type: string
                    description: The latest AI reply text.
                  ai_reply_message_id:
                    type: string
                    description: Unique identifier of the AI reply message.
                  session_uuid:
                    type: string
                    description: UUID of the chat session.
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Portal Chat]
      summary: Send a portal chat message
      description: When `stream` is true, the response is a Server-Sent Events stream.
      parameters:
        - $ref: '#/components/parameters/project_uuid'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query, session_uuid]
              properties:
                query:
                  type: string
                  description: The user's chat message text.
                session_uuid:
                  type: string
                  description: UUID of the chat session to send the message to.
                clear_context:
                  type: boolean
                  default: false
                  description: If true, clears the conversation context before processing the new query.
                stream:
                  type: boolean
                  description: Overrides the project's streaming_response setting.
                attachments:
                  type: array
                  items:
                    $ref: '#/components/schemas/PortalChatAttachment'
            example:
              query: How can I reset my password?
              session_uuid: 42d93f3d-5ffb-4418-a5fd-9fc24f01ef1b
              stream: false
              attachments: []
      responses:
        '200':
          description: AI reply or Server-Sent Events stream.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                ai_reply: You can reset your password from the login page.
                ai_reply_message_id: msg_456
                user_message_id: msg_455
                session_uuid: 42d93f3d-5ffb-4418-a5fd-9fc24f01ef1b
            text/event-stream:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '402':
          description: AI credit not enough.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: There are unfinished tasks in the current session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Portal chat rate limit or daily quota exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
