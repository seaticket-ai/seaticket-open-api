openapi: 3.0.3
info:
  title: SeaTicket Project Portal API
  description: |-
    APIs for the SeaTicket support portal, including portal settings, external access,
    issue submission and management, knowledge base access, file access, and portal chat.
  version: '1.0'
servers:
  - url: https://{server}
    variables:
      server:
        default: cloud.seaticket.ai

x-readme:
  explorer-enabled: true
  metrics-enabled: false
  proxy-enabled: false

security:
  - AccountTokenAuth: []

components:
  securitySchemes:
    AccountTokenAuth:
      type: http
      scheme: bearer
      description: This is the Account-Token for authentication.

  parameters:
    project_uuid:
      name: project_uuid
      in: path
      description: The unique UUID v4 identifier of the project.
      required: true
      schema:
        type: string
        format: uuid
    issue_id:
      name: issue_id
      in: path
      description: Portal issue id.
      required: true
      schema:
        type: integer
    comment_id:
      name: comment_id
      in: path
      description: Portal issue comment id.
      required: true
      schema:
        type: integer
    view_id:
      name: view_id
      in: path
      description: Portal issue view id.
      required: true
      schema:
        type: string
    type_id:
      name: type_id
      in: path
      description: Portal issue type option id.
      required: true
      schema:
        type: string
    substate_id:
      name: substate_id
      in: path
      description: Portal issue substate option id.
      required: true
      schema:
        type: string
    session_uuid:
      name: session_uuid
      in: path
      description: Portal chat session UUID.
      required: true
      schema:
        type: string
    token:
      name: token
      in: path
      description: Portal external invitation token.
      required: true
      schema:
        type: string
        pattern: '^[a-f0-9]{32}$'
    start:
      name: start
      in: query
      description: Zero-based offset.
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0
    limit:
      name: limit
      in: query
      description: Maximum number of records to return.
      required: false
      schema:
        type: integer
        default: 1000
        minimum: 0

  schemas:
    Error:
      type: object
      properties:
        error_msg:
          type: string
          description: Human-readable error message describing the problem.
      example:
        error_msg: Permission denied.
    Success:
      type: object
      properties:
        success:
          type: boolean
          description: Indicates whether the operation succeeded.
      example:
        success: true
    Column:
      type: object
      additionalProperties: true
      description: SeaTable column metadata.
      example:
        key: '0000'
        name: title
        type: text
    PortalIssue:
      type: object
      additionalProperties: true
      properties:
        _pk:
          type: integer
          description: Primary key of the portal issue.
        title:
          type: string
          description: Title of the portal issue.
        content:
          type: string
          description: Main content body of the portal issue.
        state:
          type: string
          enum: [open, closed]
          description: Current state of the portal issue.
        substate:
          type: string
          nullable: true
          description: Current substate of the portal issue.
        type:
          type: string
          nullable: true
          description: Type or category of the portal issue.
        priority:
          type: integer
          minimum: 0
          maximum: 5
          description: Priority level from 0 (lowest) to 5 (highest).
        tags:
          type: array
          items:
            type: integer
          description: Array of tag IDs associated with the portal issue.
        creator:
          type: string
          description: Username of the issue creator.
        comment_count:
          type: integer
          description: Number of comments on the portal issue.
        linked_ticket:
          type: integer
          nullable: true
          description: Primary key of the linked ticket, if any.
        created_time:
          type: string
          format: date-time
          description: Timestamp when the portal issue was created.
        modified_time:
          type: string
          format: date-time
          description: Timestamp when the portal issue was last modified.
        deleted:
          type: boolean
          description: Whether the portal issue has been soft-deleted.
      example:
        _pk: 12
        title: Cannot log in
        content: The login page keeps redirecting.
        state: open
        substate: New
        type: Bug
        priority: 3
        tags: [1, 2]
        creator: external_8f5a
        comment_count: 1
        linked_ticket: null
        created_time: '2026-06-02T02:30:00+00:00'
        modified_time: '2026-06-02T02:30:00+00:00'
        deleted: false
    PortalIssueComment:
      type: object
      additionalProperties: true
      properties:
        _pk:
          type: integer
          description: Primary key of the comment.
        issue_id:
          type: integer
          description: Primary key of the parent portal issue.
        creator:
          type: string
          description: Username of the comment author.
        content:
          type: string
          description: Comment text content.
        via_agent:
          type: boolean
          description: Whether the comment was created by a support agent.
        created_time:
          type: string
          format: date-time
          description: Timestamp when the comment was created.
        modified_time:
          type: string
          format: date-time
          description: Timestamp when the comment was last modified.
        deleted:
          type: boolean
          description: Whether the comment has been soft-deleted.
      example:
        _pk: 8
        issue_id: 12
        creator: external_8f5a
        content: I can reproduce this in Chrome.
        via_agent: false
        created_time: '2026-06-02T02:40:00+00:00'
        modified_time: '2026-06-02T02:40:00+00:00'
        deleted: false
    ContentPayload:
      type: object
      required: [text]
      properties:
        text:
          type: string
          description: Plain text content of the issue, comment, or chat message.
        images:
          type: array
          items:
            type: string
          description: Temporary portal upload URLs returned by the upload-file API.
        links:
          type: array
          items:
            type: string
          description: Additional temporary file URLs referenced in rich text content.
      example:
        text: The login page keeps redirecting.
        images:
          - /upload-file/portal/08c1f4d2-57e3-43c4-bcce-61b781a47c18/screenshot.png
    SelectOption:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
          description: Unique identifier for the option.
        name:
          type: string
          description: Display name of the option.
        color:
          type: string
          description: Background color hex code for the option.
        text_color:
          type: string
          description: Text color hex code for the option.
        description:
          type: string
          description: Optional description text for the option.
      example:
        id: opt123
        name: Bug
        color: '#F4667C'
        text_color: '#FFFFFF'
        count: 3
    PortalIssueView:
      type: object
      additionalProperties: true
      properties:
        _id:
          type: string
          description: Unique identifier for the view.
        name:
          type: string
          description: Display name of the view.
        type:
          type: string
          description: View type (e.g. table).
        data:
          type: object
          additionalProperties: true
          description: View configuration data including filters and sorts.
      example:
        _id: view_1
        name: Open issues
        type: table
        data:
          filters: []
          sorts: []
    PortalSettings:
      type: object
      properties:
        allow_anonymous:
          type: boolean
          description: Whether anonymous users can access the portal.
        enable_password_protection:
          type: boolean
          description: Whether the portal requires a password to access.
        show_knowledge_base:
          type: boolean
          description: Whether the knowledge base tab is visible in the portal.
        chat_allowed_sources:
          $ref: '#/components/schemas/PortalChatAllowedSources'
          description: Allowed data sources for the portal AI chat.
        daily_chat_credit_limit:
          type: integer
          description: Maximum AI chat credits a user can consume per day.
      example:
        allow_anonymous: true
        enable_password_protection: false
        show_knowledge_base: true
        chat_allowed_sources:
          connection_ids: [5, 8]
          extra_sources: [portal_issue, knowledge_base]
        daily_chat_credit_limit: 50
    PortalChatAllowedSources:
      type: object
      properties:
        connection_ids:
          type: array
          items:
            oneOf:
              - type: integer
              - type: string
          description: IDs of SeaTable connection records to use as chat sources.
        extra_sources:
          type: array
          items:
            type: string
          description: Additional source types beyond connections, such as portal_issue or knowledge_base.
      example:
        connection_ids: [5]
        extra_sources: [portal_issue, knowledge_base]
    PortalChatSession:
      type: object
      additionalProperties: true
      properties:
        session_uuid:
          type: string
          description: Unique UUID of the chat session.
        session_name:
          type: string
          description: Human-readable name of the chat session.
        project_uuid:
          type: string
          description: UUID of the project the session belongs to.
        username:
          type: string
          description: User who owns the chat session.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the session was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the session was last updated.
      example:
        session_uuid: 42d93f3d-5ffb-4418-a5fd-9fc24f01ef1b
        session_name: Login help
        project_uuid: 08c1f4d2-57e3-43c4-bcce-61b781a47c18
        username: external_8f5a
    PortalChatMessage:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
          description: Unique identifier for the message.
        role:
          type: string
          description: Role of the message sender (user or assistant).
        content:
          type: string
          description: Text content of the message.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the message was created.
      example:
        id: msg_123
        role: assistant
        content: Please try clearing your browser cache first.
    PortalChatAttachment:
      type: object
      properties:
        type:
          type: string
          example: image
          description: MIME type category of the attachment (e.g. image, file).
        name:
          type: string
          example: screenshot.png
          description: Original filename of the attachment.
        url:
          type: string
          example: /upload-file/portal/08c1f4d2-57e3-43c4-bcce-61b781a47c18/screenshot.png
          description: URL to access the attachment content.

  responses:
    BadRequest:
      description: Bad request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication credentials were not provided or are invalid.
    Forbidden:
      description: Permission denied.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalServerError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

paths:
  /api/v1/portal/{project_uuid}/settings/:
    get:
      tags: [Portal Settings]
      summary: Get portal settings
      description: Retrieve the current portal settings for the given project.
      parameters:
        - $ref: '#/components/parameters/project_uuid'
      responses:
        '200':
          description: Portal settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalSettings'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Portal Settings]
      summary: Update portal settings
      description: Update the portal settings, including access control, branding, and AI chat configuration.
      parameters:
        - $ref: '#/components/parameters/project_uuid'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                allow_anonymous:
                  type: integer
                  enum: [0, 1]
                enable_password_protection:
                  type: integer
                  enum: [0, 1]
                show_knowledge_base:
                  type: integer
                  enum: [0, 1]
                password:
                  type: string
                  description: Required when enabling password protection for the first time.
                portal_name:
                  type: string
                portal_logo:
                  type: string
                  description: Logo URL returned by the portal logo upload API. Send an empty string to remove the logo.
                chat_allowed_sources:
                  $ref: '#/components/schemas/PortalChatAllowedSources'
                daily_chat_credit_limit:
                  type: integer
                  minimum: 0
            example:
              allow_anonymous: 1
              enable_password_protection: 0
              show_knowledge_base: 1
              portal_name: Customer Support
              chat_allowed_sources:
                connection_ids: [5]
                extra_sources: [portal_issue, knowledge_base]
              daily_chat_credit_limit: 50
      responses:
        '200':
          description: Settings updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/portal/{project_uuid}/logo/:
    get:
      tags: [Portal Files]
      summary: Get portal logo
      description: Retrieve the portal logo image file. Authentication is not required.
      security: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
      responses:
        '200':
          description: Portal logo file.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Portal Files]
      summary: Upload portal logo
      description: Upload a new logo image for the portal. Only project admins can perform this action.
      parameters:
        - $ref: '#/components/parameters/project_uuid'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: The logo image file to upload.
      responses:
        '201':
          description: Logo uploaded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  file_url:
                    type: string
              example:
                file_url: /api/v1/portal/08c1f4d2-57e3-43c4-bcce-61b781a47c18/logo/?v=1717312800
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/portal/{project_uuid}/upload-file/:
    post:
      tags: [Portal Files]
      summary: Upload a temporary portal attachment
      description: Uploads a temporary file that can later be referenced by issue, comment, or chat content.
      parameters:
        - $ref: '#/components/parameters/project_uuid'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Temporary file uploaded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
              example:
                url: /upload-file/portal/08c1f4d2-57e3-43c4-bcce-61b781a47c18/screenshot.png
        '400':
          $ref: '#/components/responses/BadRequest'

  /upload-file/portal/{project_uuid}/{file_path}:
    get:
      tags: [Portal Files]
      summary: Get a temporary portal attachment
      description: Retrieve a previously uploaded temporary file by its file path. Files are served from temporary storage.
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - name: file_path
          in: path
          required: true
          schema:
            type: string
          description: Path to the temporary file as returned by the upload-file endpoint.
      responses:
        '200':
          description: Temporary attachment file.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '304':
          description: Not modified.
        '404':
          $ref: '#/components/responses/NotFound'

  /file/portal/{project_uuid}/{file_path}:
    get:
      tags: [Portal Files]
      summary: Get a persisted portal attachment
      description: Only files under portal-visible attachment prefixes can be retrieved.
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - name: file_path
          in: path
          required: true
          schema:
            type: string
          example: attachments/portal-issue/12/screenshot.png
          description: Path to the persisted file under a portal-visible attachment prefix.
      responses:
        '200':
          description: Persisted attachment file.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '304':
          description: Not modified.
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/portal/{project_uuid}/issues/:
    get:
      tags: [Portal Issues]
      summary: List portal issues in a portal issue view
      description: List portal issues filtered by a specific view, with pagination and linked ticket titles.
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - name: view_id
          in: query
          required: true
          schema:
            type: string
          description: The ID of the portal issue view to use for filtering and sorting.
        - $ref: '#/components/parameters/start'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: Portal issues.
          content:
            application/json:
              schema:
                type: object
                properties:
                  records:
                    type: array
                    items:
                      $ref: '#/components/schemas/PortalIssue'
                  columns:
                    type: array
                    items:
                      $ref: '#/components/schemas/Column'
                  ticket_pk_to_ticket_title:
                    type: object
                    additionalProperties:
                      type: string
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      tags: [Portal Issues]
      summary: Create a portal issue
      description: Create a new portal issue with title, content, and optional type, priority, and tags.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [title, content]
              properties:
                title:
                  type: string
                content:
                  type: string
                  description: JSON-encoded ContentPayload.
                type:
                  type: string
                priority:
                  type: integer
                  minimum: 0
                  maximum: 5
                tags:
                  type: string
                  description: JSON-encoded array of tag ids.
            example:
              title: Cannot log in
              content: '{"text":"The login page keeps redirecting.","images":[]}'
              type: Bug
              priority: 3
              tags: '[1,2]'
      parameters:
        - $ref: '#/components/parameters/project_uuid'
      responses:
        '201':
          description: Portal issue created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  portal_issue:
                    $ref: '#/components/schemas/PortalIssue'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          description: Issue creation rate limited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      tags: [Portal Issues]
      summary: Batch update portal issues
      description: Update one or more portal issues in a single request. Each entry specifies the row ID and the fields to update.
      parameters:
        - $ref: '#/components/parameters/project_uuid'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [issues_data]
              properties:
                issues_data:
                  type: array
                  items:
                    type: object
                    required: [row_id, row]
                    properties:
                      row_id:
                        type: integer
                        description: Primary key of the portal issue to update.
                      row:
                        type: object
                        additionalProperties: true
                        description: Fields to update on the portal issue.
            example:
              issues_data:
                - row_id: 12
                  row:
                    state: closed
                    substate: Resolved
      responses:
        '200':
          description: Issues updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '400':
          $ref: '#/components/responses/BadRequest'
    delete:
      tags: [Portal Issues]
      summary: Soft delete portal issues
      description: Soft-delete one or more portal issues by their primary keys. Deleted issues can be restored from the trash.
      parameters:
        - $ref: '#/components/parameters/project_uuid'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [issue_ids]
              properties:
                issue_ids:
                  type: array
                  items:
                    type: integer
                    description: Primary keys of the portal issues to soft-delete.
            example:
              issue_ids: [12, 13]
      responses:
        '200':
          description: Deletion result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: array
                    items:
                      type: integer
                  failed:
                    type: array
                    items:
                      type: integer

  /api/v1/portal/{project_uuid}/my-issues/:
    post:
      tags: [Portal Issues]
      summary: List issues created by the current portal user
      description: List portal issues created by the currently authenticated external user, with optional state filtering and config.
      parameters:
        - $ref: '#/components/parameters/project_uuid'
      requestBody:
        required: false
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                view_id:
                  type: string
                  enum: [open, closed]
                  default: open
                  description: Filter by issue state.
                start:
                  type: integer
                  default: 0
                  description: Zero-based offset.
                limit:
                  type: integer
                  default: 1000
                  description: Maximum number of records to return.
                config:
                  type: string
                  description: JSON-encoded view filter config.
      responses:
        '200':
          description: Current user's portal issues.
          content:
            application/json:
              schema:
                type: object
                properties:
                  records:
                    type: array
                    items:
                      $ref: '#/components/schemas/PortalIssue'
                  columns:
                    type: array
                    items:
                      $ref: '#/components/schemas/Column'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/portal/{project_uuid}/issues/{issue_id}/:
    get:
      tags: [Portal Issues]
      summary: Get a portal issue
      description: Retrieve a single portal issue by its primary key, including columns and the linked ticket title.
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/issue_id'
      responses:
        '200':
          description: Portal issue.
          content:
            application/json:
              schema:
                type: object
                properties:
                  issue:
                    $ref: '#/components/schemas/PortalIssue'
                  columns:
                    type: array
                    items:
                      $ref: '#/components/schemas/Column'
                  linked_ticket_title:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Portal Issues]
      summary: Update a portal issue
      description: Update the fields of an existing portal issue, including title, content, state, type, substate, priority, tags, and linked ticket.
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/issue_id'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: New title for the portal issue.
                content:
                  type: string
                  description: JSON-encoded ContentPayload.
                state:
                  type: string
                  enum: [open, closed]
                  description: New state for the portal issue.
                type:
                  type: string
                  nullable: true
                  description: New type or category for the portal issue.
                substate:
                  type: string
                  nullable: true
                  description: New substate for the portal issue.
                priority:
                  type: integer
                  minimum: 0
                  maximum: 5
                  description: New priority level from 0 (lowest) to 5 (highest).
                tags:
                  type: string
                  description: JSON-encoded array of tag ids.
                linked_ticket:
                  type: integer
                  nullable: true
                  description: Primary key of the ticket to link, or null to unlink.
      responses:
        '200':
          description: Updated row data.
          content:
            application/json:
              schema:
                type: object
                properties:
                  row:
                    type: object
                    additionalProperties: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Portal Issues]
      summary: Soft delete a portal issue
      description: Soft-delete a single portal issue by its primary key. It can later be restored from the trash.
      parameters:
        - $ref: '#/components/parameters/project_uuid'
