      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticket_comments:
                    type: array
                    items:
                      $ref: '#/components/schemas/TicketComment'
              example:
                ticket_comments:
                  - _pk: 1
                    content: "Ticket comment\n"
                    creator: "a475f61317b24c50b6fbf7c5f57860f8@auth.local"
                    created_time: "2025-12-08T22:09:16.304459-10:00"
                    modified_time: "2025-12-08T22:09:16.304459-10:00"
                    via_agent: false
        '403':
          description: Permission denied
        '404':
          description: Ticket not found

    post:
      operationId: createTicketComment
      tags:
        - Ticket comments
      summary: Create a ticket comment
      description: Create a new comment on a specific ticket.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/ticket_id'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - content
              properties:
                content:
                  type: string
                  description: JSON string containing text, images, and links
                  example: '{"text": "Comment text", "images": [], "links": []}'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  comment:
                    $ref: '#/components/schemas/TicketComment'
              example:
                comment:
                  _pk: 1
                  ticket_id: 1
                  content: "Ticket comment\n"
                  creator: "a475f61317b24c50b6fbf7c5f57860f8@auth.local"
                  created_time: "2025-12-08T22:09:16.304459-10:00"
                  modified_time: "2025-12-08T22:09:16.304459-10:00"
                  via_agent: false
        '400':
          description: Bad Request - content invalid
        '403':
          description: Permission denied
        '404':
          description: Ticket not found
        '429':
          description: Too many requests - Cannot be created again within 30 seconds
        '500':
          description: Internal Server Error


