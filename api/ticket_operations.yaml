# ==================== Ticket Substates ====================
  /api/v1/project/{project_uuid}/ticket/substates/:
    get:
      tags:
        - Ticket substates
      summary: List ticket substates
      description: List all ticket substates info. Optionally filter by state_id.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/state_id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  substates:
                    type: array
                    items:
                      $ref: '#/components/schemas/SubstateOption'
                  cascade_column_key:
                    type: string
                    description: Key of the cascade column
                  cascade_settings:
                    type: object
                    description: Mapping of state IDs to allowed substate IDs
              example: {
                  "substates": [
                      {
                          "color": "#59CB74",
                          "id": "0010",
                          "name": "New",
                          "text_color": "#FFFFFF",
                          "tickets_count": 2
                      },
                      {
                          "color": "#1A7F37",
                          "id": "0011",
                          "name": "Backlog",
                          "text_color": "#FFFFFF",
                          "tickets_count": 0
                      },
                      {
                          "color": "#46A1FD",
                          "id": "0012",
                          "name": "Working on",
                          "text_color": "#FFFFFF",
                          "tickets_count": 0
                      }
                  ],
                  "cascade_column_key": "",
                  "cascade_settings": {
                      "0001": [
                          "0010",
                          "0011",
                          "0012"
                      ],
                      "0002": [
                          "0013",
                          "0014",
                          "0015"
                      ]
                  }
              }
        '403':
          description: Permission denied
        '404':
          description: Project not found


    post:
      tags:
        - Ticket substates
      summary: Create a ticket substate
      description: Create a new ticket substate under a parent state.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - name
                - color
                - text_color
                - parent_id
              properties:
                name:
                  type: string
                  description: Substate name
                color:
                  type: string
                  description: Background color (hex)
                text_color:
                  type: string
                  description: Text color (hex)
                parent_id:
                  type: string
                  description: Parent state ID
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  substate:
                    $ref: '#/components/schemas/SubstateOption'
              example: {
                  "substate": {
                      "id": "K34C",
                      "name": "substate_name",
                      "color": "#DC82D2",
                      "text_color": "#FFFFFF"
                  }
              }
        '400':
          description: Bad Request - substate already exists
        '403':
          description: Permission denied
        '404':
          description: Project not found


    delete:
      tags:
        - Ticket substates
      summary: Batch delete ticket substates
      description: Delete multiple ticket substates.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - substate_ids
              properties:
                substate_ids:
                  type: array
                  items:
                    type: string
                  description: List of substate IDs to delete
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Bad Request
        '403':
          description: Permission denied
        '404':
          description: Project not found


