  /api/v1/project/{project_uuid}/knowledge-bases/export-excel/:
    get:
      tags:
        - Knowledge Bases
      summary: Export knowledge bases to Excel
      description: Export knowledge bases to an Excel file.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - name: table_ids
          in: query
          required: true
          schema:
            type: string
          description: Comma separated table IDs
      responses:
        '200':
          description: OK
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          description: Bad Request
        '403':
          description: Permission denied


  /api/v1/project/{project_uuid}/knowledge-bases/import-excel/:
    post:
      tags:
        - Knowledge Bases
      summary: Import knowledge bases from Excel
      description: Import knowledge bases from an Excel file.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: The Excel file to import
                file_name:
                  type: string
                  description: Original file name
                preview_only:
                  type: boolean
                  description: If true, only preview the import without applying changes
              example:
                file_name: knowledge_base_import_sample.xlsx
                preview_only: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id:
                    type: string
                    description: Task ID for tracking import progress
              example:
                task_id: job_123
        '400':
          description: Bad Request
        '403':
          description: Permission denied
        '404':
          description: Project not found


  # ==================== Knowledge base Excel IO ====================
  /api/v1/kb-io-status/:
    get:
      tags:
        - Knowledge Bases
      summary: Query knowledge base import/export task status
      description: Query the status of an import or export task using its task ID.
      security:
        - AccountTokenAuth: []
      parameters:
        - name: task_id
          in: query
          required: true
          schema:
            type: string
          description: The task ID returned by the import or export API
          example: abc12345-6789-def0
      responses:
        '200':
          description: OK - Task status and result data
        '400':
          description: Bad Request - task_id invalid
        '500':
          description: Internal Server Error

  /api/v1/knowledge-bases-import-example/:
    get:
      tags:
        - Knowledge Bases
      summary: Download knowledge base import example
      description: Download an example Excel file for importing knowledge bases.
      security:
        - AccountTokenAuth: []
      responses:
        '200':
          description: OK
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '403':
          description: Permission denied

