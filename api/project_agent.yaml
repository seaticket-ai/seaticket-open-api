openapi: 3.0.3
info:
  title: SeaTicket Project Agent API
  description: |-
    Agent run and GitHub issue type operations for projects.
  version: '1.0'
servers:
  - url: https://{server}
    variables:
      server:
        default: cloud.seaticket.ai

x-readme:
  explorer-enabled: true
  metrics-enabled: false
  proxy-enabled: false

components:
  securitySchemes:
    AccountTokenAuth:
      type: http
      scheme: bearer
      description: This is the Account-Token for authentication.

  parameters:
    project_uuid:
      name: project_uuid
      in: path
      description: The unique UUID v4 identifier of the project.
      required: true
      schema:
        type: string
    run_id:
      name: run_id
      in: path
      description: The unique identifier of an agent run
      required: true
      schema:
        type: integer
    action_id:
      name: action_id
      in: path
      description: The unique identifier of an agent action
      required: true
      schema:
        type: integer

  schemas:
    AgentAction:
      type: object
      description: A grouped agent action.
      properties:
        source_type:
          type: string
          description: Type of the source (e.g., ticket, github_issue, discourse_forum, email).
        source_id:
          type: string
          description: Unique identifier of the source item.
        source_title:
          type: string
          description: Title or summary of the source item.
        actions:
          type: array
          description: List of specific agent actions associated with this source.
          items:
            type: object
            properties:
              id:
                type: integer
                description: The unique identifier of the action.
              type:
                type: string
                description: The type of action (e.g., suggest_reply, suggest_modify_type, suggest_assign_labels, suggest_create_ticket, suggest_notify_assignee).
              tool_name:
                type: string
                description: The specific tool used by the agent for this action.
              result:
                type: string
                description: Result message of the action execution.
              status:
                type: string
                description: Status of the action (e.g., pending, executed, failed, cancelled).
              suggestion_content:
                type: string
                description: The agent's suggested content for this action.
              sources:
                type: array
                description: List of source evidence or contexts referenced by the action.
                items:
                  type: object
              statistics:
                type: string
                description: Statistics about the action execution.
              created_at:
                type: string
                description: Timestamp when the action was created.
              executed_at:
                type: string
                description: Timestamp when the action was executed.
              phase:
                type: string
                description: Only included when include_details=true.
              prompt:
                type: string
                description: Only included when include_details=true.
              step:
                type: integer
                description: Only included when include_details=true.
              tool_arguments:
                type: string
                description: Only included when include_details=true.
              observation:
                type: string
                description: Only included when include_details=true.
      example:
        source_type: ticket
        source_id: '2'
        source_title: Login issue
        actions:
          - id: 101
            type: suggest_reply
            tool_name: suggest_reply
            suggestion_content: Thanks for the report.
            result: ''
            status: pending
            sources: []
            statistics: ''
            created_at: '2026-05-27T09:00:00Z'
            executed_at: ''
    AgentRun:
      type: object
      description: Agent run summary with grouped actions.
      properties:
        id:
          type: integer
          description: Unique identifier of the agent run.
        status:
          type: string
          description: Status of the run (e.g., running, completed, failed).
        started_at:
          type: string
          description: Timestamp when the run started.
        finished_at:
          type: string
          description: Timestamp when the run finished.
        items_processed:
          type: integer
          description: Number of items processed in this run.
        error_message:
          type: string
          description: Error message if the run failed.
        items:
          type: array
          description: List of grouped agent actions by source.
          items:
            $ref: '#/components/schemas/AgentAction'
        events:
          type: array
          description: List of events that occurred during the run.
          items:
            type: object
      example:
        id: 9
        status: running
        started_at: '2026-05-27T09:00:00Z'
        finished_at: ''
        items_processed: 3
        error_message: ''
        items:
          - source_type: ticket
            source_id: '2'
            source_title: Login issue
            actions: []
        events: []
    AgentActionConfirmResponse:
      type: object
      description: Response returned when a pending agent action is successfully confirmed and executed.
      properties:
        success:
          type: boolean
          description: Indicates whether the action was successfully executed.
        action_id:
          type: integer
          description: The ID of the confirmed action.
        status:
          type: string
          description: The updated status of the action after execution (e.g., executed, failed).
        result:
          type: string
          description: Detailed result message of the execution operation.
      example:
        success: true
        action_id: 101
        status: executed
        result: Reply posted to GitHub issue #42.
    AgentActionUpdateResponse:
      type: object
      description: Response returned when a pending agent action's suggestion is updated.
      properties:
        success:
          type: boolean
          description: Indicates whether the update was successful.
        action_id:
          type: integer
          description: The ID of the updated action.
        suggestion_content:
          type: string
          description: The updated suggestion content.
      example:
        success: true
        action_id: 101
        suggestion_content: Updated reply content
    AgentActionCancelResponse:
      type: object
      description: Response returned when a pending agent action is cancelled.
      properties:
        success:
          type: boolean
          description: Indicates whether the cancellation was successful.
        action_id:
          type: integer
          description: The ID of the cancelled action.
        status:
          type: string
          description: The updated status of the action (cancelled).
      example:
        success: true
        action_id: 101
        status: cancelled
    GithubIssueTypesResponse:
      type: object
      description: Response containing available GitHub issue types.
      properties:
        issue_types:
          type: array
          description: List of mapped GitHub issue types.
          items:
            type: object
        warning:
          type: string
          description: Warning message, such as 'no_github_connection' if there are no active GitHub connections.
      example:
        issue_types:
          - id: 1
            name: Bug
            color: '#E0F0FF'
            text_color: '#5A5F66'
        warning: ''
    GithubIssueTypesRefreshResponse:
      type: object
      description: Response containing the results of refreshing GitHub issue types from the repository.
      properties:
        added:
          type: integer
          description: Number of new issue types added.
        added_names:
          type: array
          description: Names of the newly added issue types.
          items:
            type: string
        updated:
          type: integer
          description: Number of existing issue types updated.
        deleted:
          type: integer
          description: Number of issue types removed.
        issue_types:
          type: array
          description: Complete list of available issue types after the refresh.
          items:
            type: object
      example:
        added: 1
        added_names:
          - Bug
        updated: 0
        deleted: 0
        issue_types:
          - id: 1
            name: Bug
            color: '#E0F0FF'
            text_color: '#5A5F66'

paths:
  /api/v1/project/{project_uuid}/agent/runs/:
    get:
      tags:
        - Agent
      summary: List agent runs
      description: Returns a paginated list of agent runs for the project, including their basic info and grouped actions. Note that detailed fields (like phase, prompt, step) for actions are omitted by default to improve performance.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - name: page
          in: query
          description: Page number for pagination (default 1).
          required: false
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          description: Number of runs per page (default 50).
          required: false
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  runs:
                    type: array
                    items:
                      $ref: '#/components/schemas/AgentRun'
                  has_more:
                    type: boolean
                example:
                  runs:
                    - id: 9
                      status: running
                      started_at: '2026-05-27T09:00:00Z'
                      finished_at: ''
                      items_processed: 3
                      error_message: ''
                      items: []
                      events: []
                  has_more: false
        '403':
          description: Permission denied
        '404':
          description: Project not found
        '500':
          description: Internal Server Error

  /api/v1/project/{project_uuid}/agent/runs/{run_id}/:
    get:
      tags:
        - Agent
      summary: Get agent run detail
      description: Retrieves detailed information about a specific agent run, including all actions taken during the run grouped by source items. Set `include_details=true` to retrieve detailed execution steps and prompts.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/run_id'
        - name: include_details
          in: query
          description: When set to 'true', includes additional action fields (phase, prompt, step, tool_arguments, observation).
          required: false
          schema:
            type: string
            enum:
              - 'true'
              - 'false'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRun'
              example:
                id: 9
                status: running
                started_at: '2026-05-27T09:00:00Z'
                finished_at: ''
                items_processed: 3
                error_message: ''
                items:
                  - source_type: ticket
                    source_id: '2'
                    source_title: Login issue
                    actions: []
                events: []
        '403':
          description: Permission denied
        '404':
          description: Project not found or run not found
        '500':
          description: Internal Server Error

  /api/v1/project/{project_uuid}/agent/runs/{run_id}/actions/{action_id}/confirm/:
    post:
      tags:
        - Agent
      summary: Confirm a pending agent action
      description: |
        Approves and executes a pending action proposed by the agent. 
        When confirmed, the system dispatches the execution logic (e.g., posting a reply to GitHub) based on the action's `source_type` and `tool_name`, and then updates the action status to `executed`. 
        If the action requires a mapping that is missing (e.g., suggesting a GitHub issue type without mapping), it returns a 400 error with `error_code: mapping_required` and includes available mapping options.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/run_id'
        - $ref: '#/components/parameters/action_id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentActionConfirmResponse'
              example:
                success: true
                action_id: 101
                status: executed
                result: Reply posted to GitHub issue #42.
        '400':
          description: Bad Request
          content:
            application/json:
              example:
                error_code: mapping_required
                agent_type: github_issue
                github_issue_types:
                  - id: 1
                    name: Bug
                    color: '#E0F0FF'
                    text_color: '#5A5F66'
        '403':
          description: Permission denied
        '404':
          description: Project not found or action not found
        '500':
          description: Internal Server Error

  /api/v1/project/{project_uuid}/agent/runs/{run_id}/actions/{action_id}/:
    patch:
      tags:
        - Agent
      summary: Update a pending agent action
      description: Allows a user to edit the `suggestion_content` of a pending agent action before confirming it. Fails if the action does not belong to the run or is no longer pending.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/run_id'
        - $ref: '#/components/parameters/action_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - suggestion_content
              properties:
                suggestion_content:
                  type: string
                  description: New suggestion content for the pending action.
              example:
                suggestion_content: Updated reply content
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentActionUpdateResponse'
              example:
                success: true
                action_id: 101
                suggestion_content: Updated reply content
        '400':
          description: Bad Request
        '403':
          description: Permission denied
        '404':
          description: Project not found or action not found
        '500':
          description: Internal Server Error

  /api/v1/project/{project_uuid}/agent/runs/{run_id}/actions/{action_id}/cancel/:
    post:
      tags:
        - Agent
      summary: Cancel a pending agent action
      description: Rejects and cancels a pending agent action. The action's status is updated to `cancelled` and it will not be executed. Fails if the action is no longer pending.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/run_id'
        - $ref: '#/components/parameters/action_id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentActionCancelResponse'
              example:
                success: true
                action_id: 101
                status: cancelled
        '400':
          description: Bad Request
        '403':
          description: Permission denied
        '404':
          description: Project not found or action not found
        '500':
          description: Internal Server Error

  /api/v1/project/{project_uuid}/github/issue-types/:
    get:
      tags:
        - Agent
      summary: List GitHub issue type options
      description: Retrieves the cached list of GitHub issue types available across active GitHub connections for the project. If there are no active GitHub connections, returns an empty list with a warning.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GithubIssueTypesResponse'
              example:
                issue_types:
                  - id: 1
                    name: Bug
                    color: '#E0F0FF'
                    text_color: '#5A5F66'
                warning: ''
        '403':
          description: Permission denied
        '404':
          description: Project not found
        '500':
          description: Internal Server Error
    post:
      tags:
        - Agent
      summary: Refresh GitHub issue types
      description: Forces a sync with the GitHub API to fetch the latest issue types for the project's first active GitHub repository. It updates the cached options in the database, resolving renames and deletions.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GithubIssueTypesRefreshResponse'
              example:
                added: 1
                added_names:
                  - Bug
                updated: 0
                deleted: 0
                issue_types:
                  - id: 1
                    name: Bug
                    color: '#E0F0FF'
                    text_color: '#5A5F66'
        '400':
          description: Bad Request
        '403':
          description: Permission denied
        '404':
          description: Project not found
        '500':
          description: Internal Server Error
        '502':
          description: Bad Gateway - Failed to fetch issue types from GitHub
