openapi: 3.0.3
info:
  title: SeaTicket Project Connections API
  description: |-
    Connection management, records, views, and attachment actions.
  version: '1.0'
servers:
  - url: https://{server}
    variables:
      server:
        default: cloud.seaticket.ai

x-readme:
  explorer-enabled: true
  metrics-enabled: false
  proxy-enabled: false

components:
  securitySchemes:
    AccountTokenAuth:
      type: http
      scheme: bearer
      description: This is the Account-Token for authentication.

  parameters:
    project_uuid:
      name: project_uuid
      in: path
      description: The unique UUID v4 identifier of the project.
      required: true
      schema:
        type: string
    connection_id:
      name: connection_id
      in: path
      description: The unique identifier of a project connection.
      required: true
      schema:
        type: integer
    view_id:
      name: view_id
      in: path
      description: The unique identifier of a connection view.
      required: true
      schema:
        type: string
    record_id:
      name: record_id
      in: path
      description: The unique identifier of a connection record.
      required: true
      schema:
        type: integer
    email_id:
      name: email_id
      in: path
      description: The unique identifier of an email record.
      required: true
      schema:
        type: integer
    view_id_query:
      name: view_id
      in: query
      description: The unique identifier of the connection view to query records from.
      required: true
      schema:
        type: string
    connection_ids_query:
      name: connection_ids
      in: query
      description: Comma-separated list of connection IDs to query status for.
      required: true
      schema:
        type: string
    page:
      name: page
      in: query
      description: Page number for pagination (default 1).
      required: false
      schema:
        type: integer
        default: 1
    per_page:
      name: per_page
      in: query
      description: Number of items per page (default 100).
      required: false
      schema:
        type: integer
        default: 100
    start:
      name: start
      in: query
      description: The starting offset for paginated results (default 0).
      required: false
      schema:
        type: integer
        default: 0
    limit:
      name: limit
      in: query
      description: The maximum number of records to return (default 1000).
      required: false
      schema:
        type: integer
        default: 1000

  schemas:
    ConnectionRecord:
      type: object
      description: Full details of a project connection, including configuration, sync status, and AI processing state.
      properties:
        id:
          type: integer
          description: Unique identifier of the connection.
        name:
          type: string
          description: Display name of the connection.
        type:
          type: string
          description: Type of the connection (e.g., github_issue, discourse_forum, email, site).
        config:
          type: object
          description: Decrypted configuration object containing connection-specific settings.
        modifier:
          type: string
          description: Username of the last person who modified the connection.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the connection was created.
        indexed_at:
          type: string
          format: date-time
          description: Timestamp when the connection data was last indexed.
        last_sync_time:
          type: string
          format: date-time
          description: Timestamp of the last data synchronization.
        status:
          type: string
          description: JSON-encoded status information, including the last sync result and record counts.
        is_active:
          type: boolean
          description: Whether the connection is currently active and accepting syncs.
        ai_status:
          type: string
          description: JSON-encoded AI processing status (e.g., pending, processing, completed).
        last_ai_processing_time:
          type: string
          format: date-time
          description: Timestamp of the last AI processing attempt.
        ai_indexed_at:
          type: string
          format: date-time
          description: Timestamp when AI summaries were last indexed.
        content_vector_indexed_at:
          type: string
          format: date-time
          description: Timestamp when content vectors were last indexed for similarity search.
        content_vector_status:
          type: string
          description: JSON-encoded content vector indexing status.
      example:
        id: 7
        name: GitHub Issues
        type: github_issue
        config:
          installation_id: 123456
          repository: https://github.com/org/repo
        modifier: alice@example.com
        created_at: '2026-05-27T09:00:00Z'
        indexed_at: '2026-05-27T09:05:00Z'
        last_sync_time: '2026-05-27T09:10:00Z'
        status: '{"last_sync_status":"success"}'
        is_active: true
        ai_status: '{"last_ai_processing_status":"pending"}'
        last_ai_processing_time: ''
        ai_indexed_at: ''
        content_vector_indexed_at: ''
        content_vector_status: ''
    ConnectionView:
      type: object
      description: Connection view definition or navigation node.
      additionalProperties: true
      example:
        _id: nc5t
        table_id: '0000'
        name: Default
        type: table
        filters: []
        groupbys: []
        filter_conjunction: Or
        hidden_columns: []
    ConnectionRecordsResponse:
      type: object
      properties:
        records:
          type: array
          items:
            $ref: '#/components/schemas/ConnectionRecord'
    ConnectionDetailResponse:
      type: object
      description: Response containing connection records with associated metadata.
      properties:
        records:
          type: array
          description: Paginated list of row records from the connection.
          items:
            type: object
        columns:
          type: array
          description: Column definitions describing the schema of the records.
          items:
            type: object
        name:
          type: string
          description: Display name of the connection.
        type:
          type: string
          description: Connection type (e.g., github_issue, discourse_forum, email).
        ticket_pk_to_ticket_title:
          type: object
          description: Mapping of linked ticket PKs to their titles for quick reference.
        related_users:
          type: array
          description: List of users related to the connection (only for general_task connections).
          items:
            type: object
    ConnectionRecordDetailResponse:
      type: object
      description: Response containing full details of a single connection record.
      properties:
        record:
          type: object
          description: The detailed record data.
        columns:
          type: array
          description: Column definitions describing the schema of the record.
          items:
            type: object
        linked_ticket_title:
          type: string
          description: Title of the linked ticket, if the record is associated with one.
        related_users:
          type: array
          description: List of users related to the record (only for general_task connections).
          items:
            type: object
    SuccessResponse:
      type: object
      description: Generic success confirmation response.
      properties:
        success:
          type: boolean
          description: Whether the operation was successful.
      example:
        success: true
    ReplyEmailResponse:
      type: object
      description: Response containing the saved reply email data.
      properties:
        sender_name:
          type: string
          description: Display name of the email sender.
        sender_email:
          type: string
          description: Email address of the sender.
        email_to:
          type: string
          description: Recipient email address(es).
        cc:
          type: string
          description: CC recipient email address(es).
        subject:
          type: string
          description: Subject line of the reply email.
        content:
          type: string
          description: Plain text body of the reply email.
        html_content:
          type: string
          description: HTML body of the reply email (optional).
        reply_to_message_id:
          type: string
          description: The Message-ID of the original email being replied to.
        origin_thread_id:
          type: string
          description: The original thread ID from the email provider.
        message_id:
          type: string
          description: The Message-ID generated for this reply.
        email_id:
          type: string
          description: The external email provider's ID for this message.
        _pk:
          type: integer
          description: The primary key of the saved reply email record.
      example:
        sender_name: SeaQA
        sender_email: support@example.com
        email_to: user@example.com
        cc: ''
        subject: 'Re: Login issue'
        content: Thanks for the update.
        html_content: '<p>Thanks for the update.</p>'
        reply_to_message_id: '<abc@example.com>'
        origin_thread_id: 123
        message_id: '<reply@example.com>'
        email_id: fastmail-123
        _pk: 11
    ReplyDiscourseResponse:
      type: object
      description: Response containing the saved Discourse reply data.
      properties:
        post_number:
          type: integer
          description: The post number assigned by Discourse.
        content:
          type: string
          description: The text content of the reply.
        author:
          type: string
          description: The username that posted the reply.
        topic_pk:
          type: integer
          description: The primary key of the topic being replied to.
        _pk:
          type: integer
          description: The primary key of the saved reply record.
      example:
        post_number: 5
        content: Thanks, we will look into it.
        author: alice@example.com
        topic_pk: 12
        _pk: 33
    GithubIssueResponse:
      type: object
      description: Response containing the updated GitHub issue data.
      properties:
        issue:
          type: object
          description: The updated issue object returned by the GitHub API.
      example:
        issue:
          id: 123
          number: 42
          title: Fix login issue
          state: open
    TaskIdResponse:
      type: object
      description: Response containing the identifier for a submitted background task.
      properties:
        task_id:
          type: string
          description: The unique identifier for the submitted background task.
      example:
        task_id: job_123
    ConnectionStatusMap:
      type: object
      description: A map of connection IDs to their sync status information.
      additionalProperties:
        type: object
        description: Status object for a single connection.
        properties:
          status:
            type: string
            description: JSON-encoded status string containing last_sync_status and other details.
          last_sync_time:
            type: string
            format: date-time
            description: Timestamp of the last sync attempt.
      example:
        "7":
          status: '{"last_sync_status":"success"}'
          last_sync_time: '2026-05-27T09:10:00Z'

paths:
  /api/v1/project/{project_uuid}/connections/:
    get:
      tags:
        - Connections
      summary: List project connections
      description: Returns a paginated list of all non-deleted connections in the project.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/per_page'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionRecordsResponse'
              example:
                records:
                  - id: 7
                    name: GitHub Issues
                    type: github_issue
                    config:
                      installation_id: 123456
                      repository: https://github.com/org/repo
                    modifier: alice@example.com
                    created_at: '2026-05-27T09:00:00Z'
                    indexed_at: '2026-05-27T09:05:00Z'
                    last_sync_time: '2026-05-27T09:10:00Z'
                    status: '{"last_sync_status":"success"}'
                    is_active: true
                    ai_status: '{"last_ai_processing_status":"pending"}'
                    last_ai_processing_time: ''
                    ai_indexed_at: ''
                    content_vector_indexed_at: ''
                    content_vector_status: ''
        '403':
          description: Permission denied
        '404':
          description: Project not found
        '500':
          description: Internal Server Error
    post:
      tags:
        - Connections
      summary: Create a project connection
      description: Creates a new connection (e.g., GitHub, Discourse, Email, Site) for the project. The request must be sent as `multipart/form-data`. Requires admin-level project permission.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - name
                - config
                - type
              properties:
                name:
                  type: string
                  description: A unique display name for the connection.
                config:
                  type: string
                  description: JSON-encoded configuration object containing connection-specific settings (e.g., repository URL, API keys).
                type:
                  type: string
                  description: The connection type (e.g., github_issue, discourse_forum, email, site).
              example:
                name: GitHub Issues
                type: github_issue
                config: '{"installation_id": 123456, "repository": "https://github.com/org/repo"}'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  record:
                    $ref: '#/components/schemas/ConnectionRecord'
              example:
                record:
                  id: 7
                  name: GitHub Issues
                  type: github_issue
                  config:
                    installation_id: 123456
                    repository: https://github.com/org/repo
                  modifier: alice@example.com
                  created_at: '2026-05-27T09:00:00Z'
                  indexed_at: ''
                  last_sync_time: ''
                  status: '{"last_sync_status":"pending"}'
                  is_active: true
                  ai_status: '{"last_ai_processing_status":"pending"}'
                  last_ai_processing_time: ''
                  ai_indexed_at: ''
                  content_vector_indexed_at: ''
                  content_vector_status: ''
        '400':
          description: Bad Request
        '403':
          description: Permission denied
        '404':
          description: Project not found or connection type not supported
        '500':
          description: Internal Server Error

  /api/v1/project/{project_uuid}/connections/{connection_id}/:
    get:
      tags:
        - Connections
      summary: Get a project connection
      description: Retrieves the full details of a single connection by its ID.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/connection_id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  record:
                    $ref: '#/components/schemas/ConnectionRecord'
              example:
                record:
                  id: 7
                  name: GitHub Issues
                  type: github_issue
                  config:
                    installation_id: 123456
                    repository: https://github.com/org/repo
                  modifier: alice@example.com
                  created_at: '2026-05-27T09:00:00Z'
                  indexed_at: '2026-05-27T09:05:00Z'
                  last_sync_time: '2026-05-27T09:10:00Z'
                  status: '{"last_sync_status":"success"}'
                  is_active: true
                  ai_status: '{"last_ai_processing_status":"pending"}'
                  last_ai_processing_time: ''
                  ai_indexed_at: ''
                  content_vector_indexed_at: ''
                  content_vector_status: ''
        '403':
          description: Permission denied
        '404':
          description: Project not found or connection not found
        '500':
          description: Internal Server Error
    put:
      tags:
        - Connections
      summary: Update a project connection
      description: Updates the name, configuration, or active status of an existing connection. Requires admin-level project permission.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/connection_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: New display name for the connection.
                config:
                  type: string
                  description: JSON-encoded partial configuration to merge into the existing config.
                is_active:
                  type: boolean
                  description: Whether the connection should be activated or deactivated.
              example:
                name: GitHub Issues
                is_active: true
                config: '{"repository": "https://github.com/org/repo"}'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  record:
                    $ref: '#/components/schemas/ConnectionRecord'
              example:
                record:
                  id: 7
                  name: GitHub Issues
                  type: github_issue
                  config:
                    installation_id: 123456
                    repository: https://github.com/org/repo
                  modifier: alice@example.com
                  created_at: '2026-05-27T09:00:00Z'
                  indexed_at: '2026-05-27T09:05:00Z'
                  last_sync_time: '2026-05-27T09:10:00Z'
                  status: '{"last_sync_status":"success"}'
                  is_active: true
                  ai_status: '{"last_ai_processing_status":"pending"}'
                  last_ai_processing_time: ''
                  ai_indexed_at: ''
                  content_vector_indexed_at: ''
                  content_vector_status: ''
        '400':
          description: Bad Request
        '403':
          description: Permission denied
        '404':
          description: Project not found or connection not found
        '500':
          description: Internal Server Error
    delete:
      tags:
        - Connections
      summary: Delete a project connection
      description: Soft-deletes a connection by marking it as deleted. The connection will no longer appear in lists. Requires admin-level project permission.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/connection_id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                success: true
        '403':
          description: Permission denied
        '404':
          description: Project not found
        '500':
          description: Internal Server Error

  /api/v1/project/{project_uuid}/connections/{connection_id}/sync/:
    post:
      tags:
        - Connections
      summary: Sync a connection
      description: Triggers a manual sync for the specified connection. If the connection is currently syncing or the cooldown period has not elapsed, a 429 error is returned. The cooldown varies by connection type.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/connection_id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                success: true
        '403':
          description: Permission denied
        '404':
          description: Project not found or connection not found
        '429':
          description: Connection is currently syncing or sync cooldown not met
        '500':
          description: Internal Server Error

  /api/v1/project/{project_uuid}/connections/{connection_id}/details/:
    get:
      tags:
        - Connections
      summary: Get connection records
      description: Returns paginated records from a specific connection view, including column definitions, linked ticket references, and related users.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/connection_id'
        - $ref: '#/components/parameters/view_id_query'
        - $ref: '#/components/parameters/start'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionDetailResponse'
              example:
                records:
                  - _pk: 1
                    title: Issue title
                    content: Issue body
                columns:
                  - key: title
                    name: Title
                    type: text
                name: GitHub Issues
                type: github_issue
                ticket_pk_to_ticket_title:
                  "42": Ticket title
                related_users: []
        '400':
          description: Bad Request
        '403':
          description: Permission denied
        '404':
          description: Project not found or connection/view not found
        '500':
          description: Internal Server Error

  /api/v1/project/{project_uuid}/connections/query-status/:
    get:
      tags:
        - Connections
      summary: Get connection query status
      description: Returns the sync status and last sync time for one or more connections, keyed by connection ID. Accepts comma-separated connection IDs.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/connection_ids_query'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionStatusMap'
              example:
                "7":
                  status: '{"last_indexed_count": 0, "last_index_status": "completed", "total_records": 2, "last_sync_count": 0, "last_sync_status": "failed", "last_sync_changes": {"added": 0, "deleted": 0, "updated": 0}}'
                  last_sync_time: '2026-05-27T09:10:00Z'
        '400':
          description: Bad Request
        '403':
          description: Permission denied
        '404':
          description: Project not found
        '500':
          description: Internal Server Error

  /api/v1/project/{project_uuid}/connections/{connection_id}/logs/:
    get:
      tags:
        - Connections
      summary: Get connection sync log
      description: Retrieves the last sync log for the connection, with newlines converted to HTML line breaks.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/connection_id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  last_sync_log:
                    type: string
              example:
                last_sync_log: Sync completed successfully<br>Indexed 123 records
        '403':
          description: Permission denied
        '404':
          description: Project not found or connection not found
        '500':
          description: Internal Server Error

  /api/v1/project/{project_uuid}/connections/{connection_id}/records/:
    post:
      tags:
        - Connections
      summary: Create a connection record
      description: Creates a new record in a general_task connection. The record is created both remotely (via the external task adapter) and locally in SeaDB. Supports linking to an existing ticket.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/connection_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: Task title.
                status:
                  type: string
                  description: Task status.
                size:
                  type: string
                  description: Task size.
                priority:
                  type: string
                  description: Task priority.
                assignees:
                  type: array
                  items:
                    type: string
                participants:
                  type: array
                  items:
                    type: string
                version:
                  type: string
                others:
                  type: string
                content:
                  type: string
                due_date:
                  type: string
                  format: date
              example:
                title: Ship the new docs
                status: new
                size: medium
                priority: medium
                assignees:
                  - alice@example.com
                participants:
                  - bob@example.com
                version: v1
                others: ''
                content: Document the new project APIs.
                due_date: '2026-06-01'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  row:
                    type: object
              example:
                row:
                  _pk: 11
                  title: New task
                  status: new
        '400':
          description: Bad Request
        '403':
          description: Permission denied
        '404':
          description: Project not found or connection not found
        '500':
          description: Internal Server Error
    put:
      tags:
        - Connections
      summary: Batch update connection records
      description: Updates multiple records in a single request. Supports updating `outdated` for all types, and `unread` / `tags` for email connections. For general_task connections, changes are also synced to the remote task adapter.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/connection_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - records_data
              properties:
                records_data:
                  type: array
                  items:
                    type: object
              example:
                records_data:
                  - row_id: 1
                    row:
                      outdated: false
                  - row_id: 2
                    row:
                      unread: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                success: true
        '400':
          description: Bad Request
        '403':
          description: Permission denied
        '404':
          description: Project not found or connection not found
        '500':
          description: Internal Server Error

  /api/v1/project/{project_uuid}/connections/{connection_id}/records/{record_id}/:
    get:
      tags:
        - Connections
      summary: Get a connection record
      description: Retrieves the full detail of a single record, including its columns, linked ticket title, and related users. Supports multiple connection types (GitHub, Discourse, Email, Site, Seafile, Notion, General Task).
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/connection_id'
        - $ref: '#/components/parameters/record_id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  record:
                    type: object
                  columns:
                    type: array
                    items:
                      type: object
                  linked_ticket_title:
                    type: string
                  related_users:
                    type: array
                    items:
                      type: object
              example:
                record:
                  _pk: 1
                  title: Issue title
                  content: Issue body
                columns:
                  - key: title
                    name: Title
                    type: text
                linked_ticket_title: Ticket title
                related_users: []
        '400':
          description: Bad Request
        '403':
          description: Permission denied
        '404':
          description: Project not found or connection/record not found
        '500':
          description: Internal Server Error
    put:
      tags:
        - Connections
      summary: Update a connection record
      description: Updates specific fields on a single record. Supports `outdated` for all types, `unread` / `tags` for email connections, and `linked_ticket` for supported types. For general_task connections, changes are also synced to the remote task adapter.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/connection_id'
        - $ref: '#/components/parameters/record_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                outdated:
                  type: boolean
                unread:
                  type: boolean
                tags:
                  type: array
                  items:
                    type: string
                linked_ticket:
                  type: integer
              example:
                outdated: false
                linked_ticket: 42
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                success: true
        '400':
          description: Bad Request
        '403':
          description: Permission denied
        '404':
          description: Project not found or connection/record not found
        '500':
          description: Internal Server Error

  /api/v1/project/{project_uuid}/connections/{connection_id}/reply-email/:
    post:
      tags:
        - Connections
      summary: Reply by email
      description: Sends a reply email for a specific email thread within the connection. Requires the `email_id` of the email being replied to and the reply `content`. The response includes the saved reply record.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/connection_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email_id
                - content
              properties:
                email_id:
                  type: integer
                  description: Email row id.
                content:
                  type: string
                  description: Reply body text.
                to:
                  type: string
                  description: Reply recipient list.
                cc:
                  type: string
                  description: CC recipient list.
                subject:
                  type: string
                  description: Reply subject.
                html_content:
                  type: string
                  description: Optional HTML body.
              example:
                email_id: 11
                to: user@example.com
                cc: team@example.com
                subject: 'Re: Login issue'
                content: Thanks for the update.
                html_content: '<p>Thanks for the update.</p>'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplyEmailResponse'
              example:
                sender_name: SeaQA
                sender_email: support@example.com
                email_to: user@example.com
                cc: ''
                subject: 'Re: Login issue'
                content: Thanks for the update.
                html_content: '<p>Thanks for the update.</p>'
                reply_to_message_id: '<abc@example.com>'
                origin_thread_id: 123
                message_id: '<reply@example.com>'
                email_id: fastmail-123
                _pk: 11
        '400':
          description: Bad Request
        '403':
          description: Permission denied
        '404':
          description: Project not found or email not found
        '500':
          description: Internal Server Error

  /api/v1/project/{project_uuid}/connections/{connection_id}/github-issue/:
    put:
      tags:
        - Connections
      summary: Update a GitHub issue
      description: Updates a GitHub issue's title, state, state_reason, labels, or issue_type. Changes are applied both on GitHub (via the GitHub API) and in the local SeaDB store.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/connection_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                _pk:
                  type: integer
                  description: The primary key of the GitHub issue record in SeaDB.
                title:
                  type: string
                  description: New title for the GitHub issue.
                state:
                  type: string
                  description: New state (e.g., open, closed).
                state_reason:
                  type: string
                  description: Reason for the state change (e.g., completed, not_planned, reopened).
                labels:
                  type: array
                  description: New list of label names to apply.
                  items:
                    type: string
                issue_type:
                  type: string
                  description: New issue type (e.g., Bug, Feature, Task).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GithubIssueResponse'
              example:
                issue:
                  id: 123
                  number: 42
                  title: Fix login issue
                  state: open
        '400':
          description: Bad Request
        '403':
          description: Permission denied
        '404':
          description: Project not found or issue not found
        '409':
          description: Conflict with another transaction
        '429':
          description: Too many requests
        '500':
          description: Internal Server Error

  /api/v1/project/{project_uuid}/connections/{connection_id}/reply-discourse/:
    post:
      tags:
        - Connections
      summary: Reply to a Discourse topic
      description: Posts a reply to a Discourse topic within the connection. Requires the topic's primary key (`_pk`) and the reply `content`. Both the Discourse API and local storage are updated.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/connection_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - _pk
                - content
              properties:
                _pk:
                  type: integer
                  description: Discourse topic record id.
                content:
                  type: string
                  description: Reply content.
              example:
                _pk: 12
                content: Thanks, we will look into it.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplyDiscourseResponse'
              example:
                post_number: 5
                content: Thanks, we will look into it.
                author: alice@example.com
                topic_pk: 12
                _pk: 33
        '400':
          description: Bad Request
        '403':
          description: Permission denied
        '404':
          description: Project not found or topic not found
        '500':
          description: Internal Server Error

  /api/v1/project/{project_uuid}/connections/{connection_id}/views/:
    get:
      tags:
        - Connection views
      summary: List connection views
      description: Returns the list of all views and navigation structure for the connection, including folder organization.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/connection_id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                views:
                  - _id: nc5t
                    table_id: '0000'
                    name: Default
                    type: table
                    filters: []
                    groupbys: []
                    filter_conjunction: Or
                    hidden_columns: []
    post:
      tags:
        - Connection views
      summary: Create a connection view
      description: Creates a new view (table or folder) for the connection. Requires a unique `name`. The returned view includes an auto-generated `_id`.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/connection_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  description: Display name for the new view.
                type:
                  type: string
                  description: View type (e.g., table, folder).
                data:
                  type: object
                  description: Optional configuration data for the view (e.g., filters, columns).
              example:
                name: Default
                type: table
                data: {}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  view:
                    $ref: '#/components/schemas/ConnectionView'
              example:
                view:
                  _id: nc5t
                  table_id: '0000'
                  name: Default
                  type: table
                  filters: []
                  groupbys: []
                  filter_conjunction: Or
                  hidden_columns: []

  /api/v1/project/{project_uuid}/connections/{connection_id}/views/{view_id}/:
    get:
      tags:
        - Connection views
      summary: Get a connection view
      description: Retrieves the full configuration of a single view by its ID.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/connection_id'
        - $ref: '#/components/parameters/view_id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionView'
              example:
                _id: nc5t
                table_id: '0000'
                name: Default
                type: table
                filters: []
                groupbys: []
                filter_conjunction: Or
                hidden_columns: []
    put:
      tags:
        - Connection views
      summary: Update a connection view
      description: Updates the configuration of an existing view by replacing its `view_data`.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/connection_id'
        - $ref: '#/components/parameters/view_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                view_data:
                  type: object
                  description: The full view configuration object to replace the existing one.
              example:
                view_data:
                  _id: nc5t
                  name: Default renamed
                  filters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Whether the update was successful.
              example:
                success: true
    delete:
      tags:
        - Connection views
      summary: Delete a connection view
      description: Permanently removes a view from the connection.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/connection_id'
        - $ref: '#/components/parameters/view_id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                success: true

  /api/v1/project/{project_uuid}/connections/{connection_id}/move-views/:
    post:
      tags:
        - Connection views
      summary: Move connection views
      description: Reorders or moves a view relative to another view or folder within the connection's navigation structure.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/connection_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                source_view_id:
                  type: string
                  description: The ID of the view to move.
                source_folder_id:
                  type: string
                  description: The folder ID of the source (optional).
                target_view_id:
                  type: string
                  description: The ID of the target view to position relative to.
                target_folder_id:
                  type: string
                  description: The folder ID of the target (optional).
                is_above_folder:
                  type: boolean
                  description: If true, the source is placed above the target; otherwise below.
              example:
                source_view_id: nc5t
                target_view_id: abcd
                is_above_folder: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  navigation:
                    type: array
                    items:
                      type: object
              example:
                navigation:
                  - _id: folder-1
                    type: folder
                  - _id: nc5t
                    type: view

  /api/v1/project/{project_uuid}/connections/{connection_id}/duplicate-view/:
    post:
      tags:
        - Connection views
      summary: Duplicate a connection view
      description: Creates a copy of an existing view, including its configuration, and returns the newly created view with an auto-generated `_id`.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/connection_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - view_id
              properties:
                view_id:
                  type: string
                  description: View id to duplicate.
              example:
                view_id: nc5t
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  view:
                    $ref: '#/components/schemas/ConnectionView'
              example:
                view:
                  _id: nc5t_copy
                  table_id: '0000'
                  name: Default copy
                  type: table
                  filters: []
                  groupbys: []
                  filter_conjunction: Or
                  hidden_columns: []

  /api/v1/project/{project_uuid}/connections/{connection_id}/email/{email_id}/zip-attachments/:
    post:
      tags:
        - Connections
      summary: Zip email attachments
      description: Submits a background task to zip all attachments for a specific email. Returns a `task_id` that can be used with the query-io-status endpoint to check progress.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/connection_id'
        - $ref: '#/components/parameters/email_id'
      responses:
        '200':
          description: OK

  /api/v1/project/{project_uuid}/connections/{connection_id}/email/{email_id}/download-attachments/:
    get:
      tags:
        - Connections
      summary: Download email attachments
      description: Downloads a pre-generated ZIP file containing all attachments for the specified email. Supports ETag-based caching as well as 304 Not Modified responses.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/connection_id'
        - $ref: '#/components/parameters/email_id'
      responses:
        '200':
          description: OK
          content:
            application/zip:
              schema:
                type: string
                format: binary
          headers:
            Content-Disposition:
              schema:
                type: string
              description: 'attachment; filename="attachments.zip"'
            ETag:
              schema:
                type: string
              description: ETag for caching support.
            Cache-Control:
              schema:
                type: string
              description: 'max-age=604800, private'
        '304':
          description: Not Modified (ETag matched)
        '403':
          description: Permission denied
        '404':
          description: Project, connection, email, or ZIP file not found

  /api/v1/query-io-status/:
    get:
      tags:
        - Connections
      summary: Query IO task status
      description: Query the status of a long-running IO task by task_id.
      security:
        - AccountTokenAuth: []
      parameters:
        - name: task_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                task_id: job_123
                status: success
                result: completed
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
