openapi: 3.0.3
info:
  title: SeaTicket Project Connections API
  description: |-
    Connection management, records, views, and attachment actions.
  version: '1.0'
servers:
  - url: https://{server}
    variables:
      server:
        default: cloud.seaticket.com

x-readme:
  explorer-enabled: true
  metrics-enabled: false
  proxy-enabled: false

components:
  securitySchemes:
    AccountTokenAuth:
      type: http
      scheme: bearer
      description: This is the Account-Token for authentication.

  parameters:
    project_uuid:
      name: project_uuid
      in: path
      description: The unique identifier of a project
      required: true
      schema:
        type: string
    connection_id:
      name: connection_id
      in: path
      description: The unique identifier of a project connection
      required: true
      schema:
        type: integer
    view_id:
      name: view_id
      in: path
      description: The unique identifier of a connection view
      required: true
      schema:
        type: string
    record_id:
      name: record_id
      in: path
      description: The unique identifier of a connection record
      required: true
      schema:
        type: integer
    email_id:
      name: email_id
      in: path
      description: The unique identifier of an email record
      required: true
      schema:
        type: integer
    view_id_query:
      name: view_id
      in: query
      required: true
      schema:
        type: string
    connection_ids_query:
      name: connection_ids
      in: query
      required: true
      schema:
        type: string
    page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        default: 1
    per_page:
      name: per_page
      in: query
      required: false
      schema:
        type: integer
        default: 100
    start:
      name: start
      in: query
      required: false
      schema:
        type: integer
        default: 0
    limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 1000

  schemas:
    ConnectionRecord:
      type: object
      description: Project connection record.
      properties:
        id:
          type: integer
          description: Connection id.
        name:
          type: string
          description: Connection name.
        type:
          type: string
          description: Connection type.
        config:
          type: object
          description: Decrypted connection config.
        modifier:
          type: string
          description: Last modifier username.
        created_at:
          type: string
          format: date-time
          description: Creation time.
        indexed_at:
          type: string
          format: date-time
          description: Last indexed time.
        last_sync_time:
          type: string
          format: date-time
          description: Last sync time.
        status:
          type: string
          description: Sync status JSON string.
        is_active:
          type: boolean
          description: Whether the connection is active.
        ai_status:
          type: string
          description: AI processing status JSON string.
        last_ai_processing_time:
          type: string
          format: date-time
          description: Last AI processing time.
        ai_indexed_at:
          type: string
          format: date-time
          description: AI index time.
        content_vector_indexed_at:
          type: string
          format: date-time
          description: Content vector index time.
        content_vector_status:
          type: string
          description: Content vector status JSON string.
      example:
        id: 7
        name: GitHub Issues
        type: github_issue
        config:
          installation_id: 123456
          repository: https://github.com/org/repo
        modifier: alice@example.com
        created_at: '2026-05-27T09:00:00Z'
        indexed_at: '2026-05-27T09:05:00Z'
        last_sync_time: '2026-05-27T09:10:00Z'
        status: '{"last_sync_status":"success"}'
        is_active: true
        ai_status: '{"last_ai_processing_status":"pending"}'
        last_ai_processing_time: ''
        ai_indexed_at: ''
        content_vector_indexed_at: ''
        content_vector_status: ''
    ConnectionView:
      type: object
      description: Connection view definition or navigation node.
      additionalProperties: true
      example:
        _id: nc5t
        table_id: '0000'
        name: Default
        type: table
        filters: []
        groupbys: []
        filter_conjunction: Or
        hidden_columns: []
    ConnectionRecordsResponse:
      type: object
      properties:
        records:
          type: array
          items:
            $ref: '#/components/schemas/ConnectionRecord'
    ConnectionDetailResponse:
      type: object
      properties:
        records:
          type: array
          items:
            type: object
        columns:
          type: array
          items:
            type: object
        name:
          type: string
        type:
          type: string
        ticket_pk_to_ticket_title:
          type: object
        related_users:
          type: array
          items:
            type: object
    ConnectionRecordDetailResponse:
      type: object
      properties:
        record:
          type: object
        columns:
          type: array
          items:
            type: object
        linked_ticket_title:
          type: string
        related_users:
          type: array
          items:
            type: object
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      example:
        success: true
    ReplyEmailResponse:
      type: object
      properties:
        sender_name:
          type: string
        sender_email:
          type: string
        email_to:
          type: string
        cc:
          type: string
        subject:
          type: string
        content:
          type: string
        html_content:
          type: string
        reply_to_message_id:
          type: string
        origin_thread_id:
          type: string
        message_id:
          type: string
        email_id:
          type: string
        _pk:
          type: integer
      example:
        sender_name: SeaQA
        sender_email: support@example.com
        email_to: user@example.com
        cc: ''
        subject: 'Re: Login issue'
        content: Thanks for the update.
        html_content: '<p>Thanks for the update.</p>'
        reply_to_message_id: '<abc@example.com>'
        origin_thread_id: 123
        message_id: '<reply@example.com>'
        email_id: fastmail-123
        _pk: 11
    ReplyDiscourseResponse:
      type: object
      properties:
        post_number:
          type: integer
        content:
          type: string
        author:
          type: string
        topic_pk:
          type: integer
        _pk:
          type: integer
      example:
        post_number: 5
        content: Thanks, we will look into it.
        author: alice@example.com
        topic_pk: 12
        _pk: 33
    GithubIssueResponse:
      type: object
      properties:
        issue:
          type: object
      example:
        issue:
          id: 123
          number: 42
          title: Fix login issue
          state: open
    TaskIdResponse:
      type: object
      properties:
        task_id:
          type: string
      example:
        task_id: job_123
    ConnectionStatusMap:
      type: object
      additionalProperties:
        type: object
        properties:
          status:
            type: string
          last_sync_time:
            type: string
            format: date-time
      example:
        "7":
          status: '{"last_sync_status":"success"}'
          last_sync_time: '2026-05-27T09:10:00Z'

paths:
  /api/v1/project/{project_uuid}/connections/:
    get:
      tags:
        - Connections
      summary: List project connections
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/per_page'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionRecordsResponse'
              example:
                records:
                  - id: 7
                    name: GitHub Issues
                    type: github_issue
                    config:
                      installation_id: 123456
                      repository: https://github.com/org/repo
                    modifier: alice@example.com
                    created_at: '2026-05-27T09:00:00Z'
                    indexed_at: '2026-05-27T09:05:00Z'
                    last_sync_time: '2026-05-27T09:10:00Z'
                    status: '{"last_sync_status":"success"}'
                    is_active: true
                    ai_status: '{"last_ai_processing_status":"pending"}'
                    last_ai_processing_time: ''
                    ai_indexed_at: ''
                    content_vector_indexed_at: ''
                    content_vector_status: ''
        '403':
          description: Permission denied
        '404':
          description: Project not found
        '500':
          description: Internal Server Error
    post:
      tags:
        - Connections
      summary: Create a project connection
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - name
                - config
                - type
              properties:
                name:
                  type: string
                config:
                  type: string
                type:
                  type: string
              example:
                name: GitHub Issues
                type: github_issue
                config: '{"installation_id": 123456, "repository": "https://github.com/org/repo"}'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  record:
                    $ref: '#/components/schemas/ConnectionRecord'
              example:
                record:
                  id: 7
                  name: GitHub Issues
                  type: github_issue
                  config:
                    installation_id: 123456
                    repository: https://github.com/org/repo
                  modifier: alice@example.com
                  created_at: '2026-05-27T09:00:00Z'
                  indexed_at: ''
                  last_sync_time: ''
                  status: '{"last_sync_status":"pending"}'
                  is_active: true
                  ai_status: '{"last_ai_processing_status":"pending"}'
                  last_ai_processing_time: ''
                  ai_indexed_at: ''
                  content_vector_indexed_at: ''
                  content_vector_status: ''
        '400':
          description: Bad Request
        '403':
          description: Permission denied
        '404':
          description: Project not found or connection type not supported
        '500':
          description: Internal Server Error

  /api/v1/project/{project_uuid}/connections/{connection_id}/:
    get:
      tags:
        - Connections
      summary: Get a project connection
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/connection_id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  record:
                    $ref: '#/components/schemas/ConnectionRecord'
              example:
                record:
                  id: 7
                  name: GitHub Issues
                  type: github_issue
                  config:
                    installation_id: 123456
                    repository: https://github.com/org/repo
                  modifier: alice@example.com
                  created_at: '2026-05-27T09:00:00Z'
                  indexed_at: '2026-05-27T09:05:00Z'
                  last_sync_time: '2026-05-27T09:10:00Z'
                  status: '{"last_sync_status":"success"}'
                  is_active: true
                  ai_status: '{"last_ai_processing_status":"pending"}'
                  last_ai_processing_time: ''
                  ai_indexed_at: ''
                  content_vector_indexed_at: ''
                  content_vector_status: ''
        '403':
          description: Permission denied
        '404':
          description: Project not found or connection not found
        '500':
          description: Internal Server Error
    put:
      tags:
        - Connections
      summary: Update a project connection
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/connection_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                config:
                  type: string
                is_active:
                  type: boolean
              example:
                name: GitHub Issues
                is_active: true
                config: '{"repository": "https://github.com/org/repo"}'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  record:
                    $ref: '#/components/schemas/ConnectionRecord'
              example:
                record:
                  id: 7
                  name: GitHub Issues
                  type: github_issue
                  config:
                    installation_id: 123456
                    repository: https://github.com/org/repo
                  modifier: alice@example.com
                  created_at: '2026-05-27T09:00:00Z'
                  indexed_at: '2026-05-27T09:05:00Z'
                  last_sync_time: '2026-05-27T09:10:00Z'
                  status: '{"last_sync_status":"success"}'
                  is_active: true
                  ai_status: '{"last_ai_processing_status":"pending"}'
                  last_ai_processing_time: ''
                  ai_indexed_at: ''
                  content_vector_indexed_at: ''
                  content_vector_status: ''
        '400':
          description: Bad Request
        '403':
          description: Permission denied
        '404':
          description: Project not found or connection not found
        '500':
          description: Internal Server Error
    delete:
      tags:
        - Connections
      summary: Delete a project connection
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/connection_id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                success: true
        '403':
          description: Permission denied
        '404':
          description: Project not found
        '500':
          description: Internal Server Error

  /api/v1/project/{project_uuid}/connections/{connection_id}/sync/:
    post:
      tags:
        - Connections
      summary: Sync a connection
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/connection_id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                success: true
        '403':
          description: Permission denied
        '404':
          description: Project not found or connection not found
        '429':
          description: Connection is currently syncing or sync cooldown not met
        '500':
          description: Internal Server Error

  /api/v1/project/{project_uuid}/connections/{connection_id}/details/:
    get:
      tags:
        - Connections
      summary: Get connection records
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/connection_id'
        - $ref: '#/components/parameters/view_id_query'
        - $ref: '#/components/parameters/start'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionDetailResponse'
              example:
                records:
                  - _pk: 1
                    title: Issue title
                    content: Issue body
                columns:
                  - key: title
                    name: Title
                    type: text
                name: GitHub Issues
                type: github_issue
                ticket_pk_to_ticket_title:
                  "42": Ticket title
                related_users: []
        '400':
          description: Bad Request
        '403':
          description: Permission denied
        '404':
          description: Project not found or connection/view not found
        '500':
          description: Internal Server Error

  /api/v1/project/{project_uuid}/connections/query-status/:
    get:
      tags:
        - Connections
      summary: Get connection query status
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/connection_ids_query'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionStatusMap'
              example:
                "7":
                  status: '{"last_indexed_count": 0, "last_index_status": "completed", "total_records": 2, "last_sync_count": 0, "last_sync_status": "failed", "last_sync_changes": {"added": 0, "deleted": 0, "updated": 0}}'
                  last_sync_time: '2026-05-27T09:10:00Z'
        '400':
          description: Bad Request
        '403':
          description: Permission denied
        '404':
          description: Project not found
        '500':
          description: Internal Server Error

  /api/v1/project/{project_uuid}/connections/{connection_id}/logs/:
    get:
      tags:
        - Connections
      summary: Get connection sync log
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/connection_id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  last_sync_log:
                    type: string
              example:
                last_sync_log: Sync completed successfully<br>Indexed 123 records
        '403':
          description: Permission denied
        '404':
          description: Project not found or connection not found
        '500':
          description: Internal Server Error

  /api/v1/project/{project_uuid}/connections/{connection_id}/records/:
    post:
      tags:
        - Connections
      summary: Create a connection record
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/connection_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: Task title.
                status:
                  type: string
                  description: Task status.
                size:
                  type: string
                  description: Task size.
                priority:
                  type: string
                  description: Task priority.
                assignees:
                  type: array
                  items:
                    type: string
                participants:
                  type: array
                  items:
                    type: string
                version:
                  type: string
                others:
                  type: string
                content:
                  type: string
                due_date:
                  type: string
                  format: date
              example:
                title: Ship the new docs
                status: new
                size: medium
                priority: medium
                assignees:
                  - alice@example.com
                participants:
                  - bob@example.com
                version: v1
                others: ''
                content: Document the new project APIs.
                due_date: '2026-06-01'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  row:
                    type: object
              example:
                row:
                  _pk: 11
                  title: New task
                  status: new
        '400':
          description: Bad Request
        '403':
          description: Permission denied
        '404':
          description: Project not found or connection not found
        '500':
          description: Internal Server Error
    put:
      tags:
        - Connections
      summary: Batch update connection records
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/connection_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - records_data
              properties:
                records_data:
                  type: array
                  items:
                    type: object
              example:
                records_data:
                  - row_id: 1
                    row:
                      outdated: false
                  - row_id: 2
                    row:
                      unread: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                success: true
        '400':
          description: Bad Request
        '403':
          description: Permission denied
        '404':
          description: Project not found or connection not found
        '500':
          description: Internal Server Error

  /api/v1/project/{project_uuid}/connections/{connection_id}/records/{record_id}/:
    get:
      tags:
        - Connections
      summary: Get a connection record
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/connection_id'
        - $ref: '#/components/parameters/record_id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  record:
                    type: object
                  columns:
                    type: array
                    items:
                      type: object
                  linked_ticket_title:
                    type: string
                  related_users:
                    type: array
                    items:
                      type: object
              example:
                record:
                  _pk: 1
                  title: Issue title
                  content: Issue body
                columns:
                  - key: title
                    name: Title
                    type: text
                linked_ticket_title: Ticket title
                related_users: []
        '400':
          description: Bad Request
        '403':
          description: Permission denied
        '404':
          description: Project not found or connection/record not found
        '500':
          description: Internal Server Error
    put:
      tags:
        - Connections
      summary: Update a connection record
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/connection_id'
        - $ref: '#/components/parameters/record_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                outdated:
                  type: boolean
                unread:
                  type: boolean
                tags:
                  type: array
                  items:
                    type: string
                linked_ticket:
                  type: integer
              example:
                outdated: false
                linked_ticket: 42
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                success: true
        '400':
          description: Bad Request
        '403':
          description: Permission denied
        '404':
          description: Project not found or connection/record not found
        '500':
          description: Internal Server Error

  /api/v1/project/{project_uuid}/connections/{connection_id}/reply-email/:
    post:
      tags:
        - Connections
      summary: Reply by email
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/connection_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email_id
                - content
              properties:
                email_id:
                  type: integer
                  description: Email row id.
                content:
                  type: string
                  description: Reply body text.
                to:
                  type: string
                  description: Reply recipient list.
                cc:
                  type: string
                  description: CC recipient list.
                subject:
                  type: string
                  description: Reply subject.
                html_content:
                  type: string
                  description: Optional HTML body.
              example:
                email_id: 11
                to: user@example.com
                cc: team@example.com
                subject: 'Re: Login issue'
                content: Thanks for the update.
                html_content: '<p>Thanks for the update.</p>'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplyEmailResponse'
              example:
                sender_name: SeaQA
                sender_email: support@example.com
                email_to: user@example.com
                cc: ''
                subject: 'Re: Login issue'
                content: Thanks for the update.
                html_content: '<p>Thanks for the update.</p>'
                reply_to_message_id: '<abc@example.com>'
                origin_thread_id: 123
                message_id: '<reply@example.com>'
                email_id: fastmail-123
                _pk: 11
        '400':
          description: Bad Request
        '403':
          description: Permission denied
        '404':
          description: Project not found or email not found
        '500':
          description: Internal Server Error

  /api/v1/project/{project_uuid}/connections/{connection_id}/github-issue/:
    put:
      tags:
        - Connections
      summary: Update a GitHub issue
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/connection_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              example:
                _pk: 123
                title: Fix login issue
                state: closed
                state_reason: completed
                labels:
                  - bug
                issue_type: Bug
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GithubIssueResponse'
              example:
                issue:
                  id: 123
                  number: 42
                  title: Fix login issue
                  state: open
        '400':
          description: Bad Request
        '403':
          description: Permission denied
        '404':
          description: Project not found or issue not found
        '409':
          description: Conflict with another transaction
        '429':
          description: Too many requests
        '500':
          description: Internal Server Error

  /api/v1/project/{project_uuid}/connections/{connection_id}/reply-discourse/:
    post:
      tags:
        - Connections
      summary: Reply to a Discourse topic
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/project_uuid'
        - $ref: '#/components/parameters/connection_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - _pk
                - content
              properties:
                _pk:
                  type: integer
                  description: Discourse topic record id.
                content:
                  type: string
                  description: Reply content.
              example:
                _pk: 12
                content: Thanks, we will look into it.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplyDiscourseResponse'
              example:
                post_number: 5
                content: Thanks, we will look into it.
                author: alice@example.com
                topic_pk: 12
                _pk: 33
        '400':
          description: Bad Request
        '403':
          description: Permission denied
        '404':
          description: Project not found or topic not found
        '500':
          description: Internal Server Error

